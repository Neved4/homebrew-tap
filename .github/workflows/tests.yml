name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

env:
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  test-bot:
    strategy:
      matrix:
        os: [macos-26, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        if: ${{ runner.os != 'Linux' }}
        with:
          xcode-version: "^26.1"

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # 2026-07-17, no tagged version

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      # Homebrew's Linux sandbox requires bwrap on PATH before brew pr-pull runs brew doctor.
      # The sysctls enable the rootless user namespaces that bwrap needs to create the sandbox.
      - name: Set up Homebrew Linux sandbox
        if: runner.os == 'Linux'
        run: |
          brew install bubblewrap
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          sudo sysctl -w user.max_user_namespaces=28633
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request' && !contains( github.event.pull_request.labels.*.name, 'CI-checksum-change-confirmed' )

      - run: brew test-bot --only-formulae --skip-checksum-only-audit
        if: github.event_name == 'pull_request' && contains( github.event.pull_request.labels.*.name, 'CI-checksum-change-confirmed' )

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'

  check:
    if: always()
    needs:
      - test-bot
    runs-on: ubuntu-latest
    steps:
    - name: Determine whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
      with:
        jobs: ${{ toJSON(needs) }}
