name: Autobump Formulas and Casks

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  autobump:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
    steps:
      - name: Update Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@1446dca236b0440c6f02723a3f14f13be2c04ab0 # v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
          user_name: Neved4
          user_email: 63655535+Neved4@users.noreply.github.com
          no_fork: true
          tap: Neved4/homebrew-tap
          force: true
          livecheck: true
      - name: Update Homebrew cask
        uses: eugenesvk/action-homebrew-bump-cask@6b066272df85c164f0496877387ecc8d989a194f # v3.8.6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
          tap: Neved4/homebrew-tap
          livecheck: true
